name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *"  # Every 10 min (Render spins down after 15 min inactivity)
  workflow_dispatch:        # Manual trigger via GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -sf "https://correlations-anomaly-detector-backend.onrender.com/api/health" \
            || echo "Backend not responding (expected if container is cold-starting)"
